<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            font-size: 30px;
            width: 100%;
            background-color: aqua;
        }

        .mydiv {

            border: 10px solid limegreen;

        }

        button {
            color: white;
            background-color: rgb(255, 100, 100);

        button:hover {

    <div class="mydiv">
        <label for="aa">id</label>

    <div>
